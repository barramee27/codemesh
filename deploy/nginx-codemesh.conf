# CodeMesh - Nginx server block for codemesh.org
# Add to /etc/nginx/sites-available/codemesh and symlink to sites-enabled
# Do NOT modify existing site configs - this is a separate block
#
# Clash grader: point DNS A/AAAA for clash.codemesh.org to this VPS, then either
# add clash.codemesh.org to this server_name (below) or use a separate server{}
# with the same proxy_pass. After DNS resolves: sudo certbot certonly --nginx -d codemesh.org -d www.codemesh.org -d clash.codemesh.org -d admin.codemesh.org
# Phase 2 (per-room hosts like abc123.codemesh.org): wildcard DNS *.codemesh.org + wildcard TLS; not required for MVP (/clash/:slug or clash host /c/:slug).

server {
    listen 80;
    server_name codemesh.org www.codemesh.org clash.codemesh.org admin.codemesh.org;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
