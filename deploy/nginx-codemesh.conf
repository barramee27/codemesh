# CodeMesh - Nginx server block for codemesh.org
# Add to /etc/nginx/sites-available/codemesh and symlink to sites-enabled
# Do NOT modify existing site configs - this is a separate block

server {
    listen 80;
    server_name codemesh.org www.codemesh.org;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
