# portfolio-v1 - barrameekottanawadee.com
# Add to /etc/nginx/sites-available/ and symlink to sites-enabled
# Set PORT=3001 (or your chosen port) when starting PM2 if 3000 is used by another app
#
# pm2 start npm --name portfolio-v1 -- start -- -p 3001
# Or: PORT=3001 pm2 start npm --name portfolio-v1 -- start

server {
    listen 80;
    server_name barrameekottanawadee.com www.barrameekottanawadee.com;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /_next/static {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
